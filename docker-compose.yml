services:
  nltype:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - nltype-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  nltype-data:
